server {
    server_name markd.appfoundry.cc;

    location /static/ {
        alias /var/www/markd/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://unix:/run/markd/markd.sock;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SSL managed by Certbot — do not edit below this line manually
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/markd.appfoundry.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/markd.appfoundry.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = markd.appfoundry.cc) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name markd.appfoundry.cc;
    return 404;
}
