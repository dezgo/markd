<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd — {{ title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="logo">Markd</h1>
    <h2 class="auth-heading">{{ title }}</h2>
    <p class="auth-body">{{ message }}</p>
    <p class="auth-link"><a href="{{ link_href }}">{{ link_text }}</a></p>
  </div>
</body>
</html>
