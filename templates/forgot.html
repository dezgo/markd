<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd — Reset password</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="logo">Markd</h1>
    {% if sent %}
      <h2 class="auth-heading">Check your email</h2>
      <p class="auth-body">If an account with that email exists, we sent a password reset link.</p>
      <p class="auth-link"><a href="{{ url_for('login') }}">Back to sign in</a></p>
    {% else %}
      <form method="post" autocomplete="on">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" autofocus required>
        <button type="submit">Send reset link</button>
      </form>
      <p class="auth-link"><a href="{{ url_for('login') }}">Back to sign in</a></p>
    {% endif %}
  </div>
</body>
</html>
