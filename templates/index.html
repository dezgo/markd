<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Markd">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/icon-16x16.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/icon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ url_for('static', filename='icons/icon-96x96.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}?v=4">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>

<header class="app-header">
  <span class="logo">Markd</span>
  <div class="header-actions">
    <a href="/settings" class="logout-btn" title="Settings" aria-label="Settings">⚙</a>
    <a href="/logout" class="logout-btn" title="Sign out" aria-label="Sign out">⏏</a>
  </div>
</header>

<main class="app-main">

  <!-- Notifications onboarding banner -->
  <div id="notif-banner" class="notif-banner" hidden></div>

  <!-- Filter tabs -->
  <nav class="filter-tabs" aria-label="Filter todos">
    <button class="tab active" data-filter="active">Active</button>
    <button class="tab" data-filter="someday">Someday</button>
    <button class="tab" data-filter="done">Done</button>
  </nav>

  <!-- Todo list -->
  <ul id="todo-list" class="todo-list" aria-label="Todos"></ul>

  <p id="empty-msg" class="empty-msg" hidden>Nothing here yet.</p>

  <p id="version" class="version-label"></p>

</main>

<button type="button" id="fab" class="fab" aria-label="Add todo" title="Add todo">＋</button>

<section id="todo-form-sheet" class="form-sheet" hidden aria-hidden="true" aria-labelledby="form-sheet-title">
  <header class="form-sheet-header">
    <button type="button" id="form-cancel-btn" class="form-icon-btn" aria-label="Cancel">✕</button>
    <h2 id="form-sheet-title">New todo</h2>
    <button type="submit" form="add-form" id="form-save-btn" class="form-icon-btn is-primary" aria-label="Save">✓</button>
  </header>

  <form id="add-form" class="form-sheet-body" autocomplete="off">
    <label class="form-field">
      <span class="form-label">Title</span>
      <input
        id="new-title"
        type="text"
        placeholder="What needs doing?"
        maxlength="500"
        required
        autocomplete="off"
      >
    </label>

    <div class="form-mode-toggle" role="radiogroup" aria-label="Scheduling">
      <button type="button" class="mode-btn is-on" data-mode="someday" role="radio" aria-checked="true">Someday</button>
      <button type="button" class="mode-btn" data-mode="schedule" role="radio" aria-checked="false">Schedule</button>
    </div>

    <div id="schedule-section" hidden>
      <div class="form-field">
        <span class="form-label">Date</span>
        <input id="new-due" type="date">
      </div>
      <div class="form-field">
        <span class="form-label">Time</span>
        <input id="new-due-time" type="time">
      </div>
      <div class="form-field">
        <span class="form-label">Repeats every</span>
        <div class="form-row">
          <input id="new-recur-interval" type="number" min="1" max="99" placeholder="—" inputmode="numeric" pattern="[0-9]*">
          <select id="new-recur-unit">
            <option value="days">days</option>
            <option value="weeks" selected>weeks</option>
            <option value="months">months</option>
            <option value="years">years</option>
          </select>
        </div>
      </div>
      <div class="form-field" id="new-day-toggles-wrap" hidden>
        <span class="form-label">On these days</span>
        <div id="new-day-toggles" class="day-toggles">
          <button type="button" class="day-toggle" data-day="0" title="Sunday">S</button>
          <button type="button" class="day-toggle" data-day="1" title="Monday">M</button>
          <button type="button" class="day-toggle" data-day="2" title="Tuesday">T</button>
          <button type="button" class="day-toggle" data-day="3" title="Wednesday">W</button>
          <button type="button" class="day-toggle" data-day="4" title="Thursday">T</button>
          <button type="button" class="day-toggle" data-day="5" title="Friday">F</button>
          <button type="button" class="day-toggle" data-day="6" title="Saturday">S</button>
        </div>
      </div>
    </div>

    <label class="form-field">
      <span class="form-label">Notes</span>
      <textarea id="new-notes" placeholder="Add a note… (optional)" maxlength="2000" rows="3" autocomplete="off"></textarea>
    </label>

    <button type="button" id="form-delete-btn" class="form-delete-btn" hidden>Delete todo</button>
  </form>
</section>

<script src="/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
  }
</script>

</body>
</html>
