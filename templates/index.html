<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Markd">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ url_for('static', filename='icons/favicon-96x96.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}?v=2">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>

<header class="app-header">
  <span class="logo">Markd</span>
  <div class="header-actions">
    <button id="notif-btn" class="notif-btn" title="Enable notifications" hidden>🔔</button>
    <a href="/logout" class="logout-btn" title="Sign out">⏏</a>
  </div>
</header>

<main class="app-main">

  <!-- Add todo form -->
  <form id="add-form" class="add-form" autocomplete="off">
    <div class="add-row">
      <input
        id="new-title"
        type="text"
        placeholder="What needs doing?"
        maxlength="500"
        required
        autocomplete="off"
      >
      <button type="submit" aria-label="Add todo">＋</button>
    </div>
    <div class="add-details">
      <input id="new-due" type="date" title="Due date (optional)">
      <input id="new-due-time" type="time" title="Due time (optional)">
      <input id="new-recur-interval" type="number" min="1" max="99" placeholder="every" title="Repeat every N…" inputmode="numeric" pattern="[0-9]*">
      <select id="new-recur-unit" title="Repeat unit">
        <option value="days">days</option>
        <option value="weeks" selected>weeks</option>
        <option value="months">months</option>
        <option value="years">years</option>
      </select>
    </div>
    <div id="new-day-toggles" class="day-toggles" hidden>
      <button type="button" class="day-toggle" data-day="0" title="Sunday">S</button>
      <button type="button" class="day-toggle" data-day="1" title="Monday">M</button>
      <button type="button" class="day-toggle" data-day="2" title="Tuesday">T</button>
      <button type="button" class="day-toggle" data-day="3" title="Wednesday">W</button>
      <button type="button" class="day-toggle" data-day="4" title="Thursday">T</button>
      <button type="button" class="day-toggle" data-day="5" title="Friday">F</button>
      <button type="button" class="day-toggle" data-day="6" title="Saturday">S</button>
    </div>
    <input id="new-notes" type="text" placeholder="Add a note… (optional)" maxlength="2000" autocomplete="off">
  </form>

  <!-- Filter tabs -->
  <nav class="filter-tabs" aria-label="Filter todos">
    <button class="tab active" data-filter="active">Active</button>
    <button class="tab" data-filter="all">All</button>
    <button class="tab" data-filter="done">Done</button>
  </nav>

  <!-- Todo list -->
  <ul id="todo-list" class="todo-list" aria-label="Todos"></ul>

  <p id="empty-msg" class="empty-msg" hidden>Nothing here yet.</p>

  <p id="version" class="version-label"></p>

</main>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>

</body>
</html>
