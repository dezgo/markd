<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Markd">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}?v=2">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="logo">Markd</h1>
    <form method="post" autocomplete="on">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" autofocus required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      {% if flashed %}
        {% for msg in flashed %}<p class="success">{{ msg }}</p>{% endfor %}
      {% endif %}
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Sign in</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
    <p class="auth-link">No account? <a href="{{ url_for('signup') }}">Sign up</a></p>
  </div>
</body>
</html>
