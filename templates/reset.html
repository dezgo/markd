<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd — Set new password</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="logo">Markd</h1>
    <form method="post" autocomplete="on">
      <label for="password">New password (min 8 chars)</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" autofocus required>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Set password</button>
    </form>
  </div>
</body>
</html>
