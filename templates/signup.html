<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markd — Sign up</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="logo">Markd</h1>
    <form method="post" autocomplete="on">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" autofocus required>
      <label for="password">Password (min 8 chars)</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Create account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
